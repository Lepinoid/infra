apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  lepinoid-pods.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"lepinoid\", phase=\"Running\"} == 1)",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Pods Running",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{namespace=\"lepinoid\", condition=\"true\"} == 0) or vector(0)",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Pods Not Ready",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"lepinoid\"}[24h]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Restarts (24h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.5 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "value",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"lepinoid\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Total CPU Usage",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Resource Usage Over Time",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "limits" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"lepinoid\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{container}}",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"lepinoid\", resource=\"cpu\"})",
              "legendFormat": "limits",
              "refId": "B"
            }
          ],
          "title": "CPU Usage by Container",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "limits" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"lepinoid\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{container}}",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"lepinoid\", resource=\"memory\"})",
              "legendFormat": "limits",
              "refId": "B"
            }
          ],
          "title": "Memory Usage by Container",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Pod Health Detail",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Ready" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "1": { "text": "Yes", "color": "green" }, "0": { "text": "No", "color": "red" } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Restarts" }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 7,
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "pod", "desc": false }]
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"lepinoid\", condition=\"true\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "expr": "kube_pod_container_status_restarts_total{namespace=\"lepinoid\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            }
          ],
          "title": "Pod Status",
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "condition": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "service": true,
                  "uid": true,
                  "prometheus": true
                },
                "renameByName": {}
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 8,
          "options": {
            "orientation": "horizontal",
            "showValue": "always",
            "barWidth": 0.8,
            "groupWidth": 0.7
          },
          "targets": [
            {
              "expr": "kube_pod_container_status_restarts_total{namespace=\"lepinoid\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Container Restarts",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "service": true,
                  "uid": true,
                  "prometheus": true
                },
                "renameByName": {
                  "Value": "Restarts"
                }
              }
            }
          ],
          "type": "barchart"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Logs",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "id": 9,
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{service_name=\"couchdb\", namespace=\"lepinoid\"}",
              "refId": "A"
            }
          ],
          "title": "CouchDB Logs",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 32 },
          "id": 10,
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{service_name=\"livesync-bridge\", namespace=\"lepinoid\"}",
              "refId": "A"
            }
          ],
          "title": "LiveSync Bridge Logs",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 40 },
          "id": 11,
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{service_name=\"cloudflared\", namespace=\"lepinoid\"}",
              "refId": "A"
            }
          ],
          "title": "Cloudflared Logs",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 48 },
          "id": 12,
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{service_name=\"grafana\", namespace=\"lepinoid\"}",
              "refId": "A"
            }
          ],
          "title": "Grafana Logs",
          "type": "logs"
        }
      ],
      "schemaVersion": 39,
      "tags": ["lepinoid", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Lepinoid Pods",
      "uid": "lepinoid-pods",
      "version": 1
    }
